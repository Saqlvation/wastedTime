<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wasted time</title>
        <link rel="icon" type="image/png" href="assets/icon.png">


    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap'); /* simple google font */
     
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            text-align: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        input {
            background: #1a1a1a;
            border: 1px solid #ff2222;
            color: #e0e0e0;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 8px 16px;
            margin: 10px 0;
            width: 200px;
        }
        button {
            background: #ff2222;
            color: #0a0a0a;
            border: none;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            padding: 10px, 30px;
            margin-top: 20px;
            cursor: pointer;
            letter-spacing: 2px;
        }
        button:hover {
            background: #e28c8c;
        }

        label {
            color: #858484;
        }
        #results {
            margin-top: 40px;
            border: 1px solid #ff2222;
            padding: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        #alert {
            color: #3d3d3d;
            font-size: 0.7rem;
            margin-top: 10px;
        }
        .highlight {
            color: #ff2222; /* the color of the highlighted text we got using <span> */
        }   
        .comparasionText {
            color: #478f4b;
        }

        .comparasionHours {
            color: #ff2222;
            /* we create a glowing effect */
            text-shadow:1px 1px 10px #fff, 1px 1px 10px #ccc;

        }
    </style>


    </head>

    <body>
        <header>
            <h1> Wasted Time </h1>
            <p> Find out how much time you have wasted... </p>
        </header>

        <div id="userData">
        <label> State Your age </label>
        <br>
        <input type="number" id="userAge" placeholder="example: 16">
        <br>
        <br>
        <br>
        <label> How much hours do you spend on useless tasks everyday? (example tiktok)</label>
        <br>
        <input type="number" id="userHours" placeholder="example: 4">
        <p id="alert">Please remember nothing will be saved, its all local.</p>
        </div>

        <div id="calculation">
            <button id="calculateTheTime">Show me the damage</button>
        </div>

        <div id="results" style="display: none;">
            <h2 id="resultText"> placeholder </h2>
            <h3 id="factText"> placeholder </h3>
        </div>

        <script src="script.js"></script>
    </body>
</html>
