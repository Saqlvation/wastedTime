<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wasted time</title>
        <link rel="icon" type="image/png" href="assets/icon.png">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rancho&effect=3d-float">
        <link rel="stylesheet" href="style.css">    



    </head>

    <body>
        
        <header>
            <h1 class="font-effect-3d-float" style="color: red;"> Wasted Time </h1> <!-- Using the 3d-float effect from google-->
            <p> Find out how much time you have wasted... </p>
        </header>

        <div id="userData">
        <label> State Your age </label>
        <br>
        <input type="number" id="userAge" placeholder="example: 16">
        <br>
        <br>
        <br>
        <label> How much hours do you spend on useless tasks everyday? </label>
        <label style="color: #35b831;">(for example tiktok)</label>
        <br>
        <input type="number" id="userHours" placeholder="example: 4">
        <p id="alert">Please remember nothing will be saved, its all local.</p>
        </div>

        <div id="calculation">
            <button id="calculateTheTime">Show me the damage</button>
        </div>

        <div id="results" style="display: none;">
            <h2 id="resultText"> placeholder </h2>
            <h3 id="factText"> placeholder </h3>
        </div>

        <div id="wastedTimeArea" style="display: none;">
        <p id="wastedHours">placeholder</p>
        <p id="wastedDays">placeholder</p>
        <p id="wastedYears">placeholder</p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
