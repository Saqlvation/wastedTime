<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wasted time</title>
        <link rel="icon" type="image/png" href="assets/icon.png">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rancho&effect=3d-float">

    <style>
        /* learning how to use different fonts effects with https://developers.google.com/fonts/docs/getting_started?hl=it */ 

        body {
            text-align: center;
            font-family: 'Rancho', cursive;
            background-color: #0c0c0c;
            color: #dbd4d4;
            font-size: 1.8rem;
            background-image: radial-gradient(#ffffff18 1px, transparent 1px);
            background-size: 20px 20px;
        }

        input {
            border: 1px solid red;
            background-color: #0c0c0c;
            text-align: center;
            color: #dbd4d4;
            padding: 10px 15px;
            font-size: 1.4rem;
        }

        .highlight {
            color: #db1f06;
            font-size: 45px;
        }
        .comparasionText {
            color: #35b831;
        }
        .comparasionHours {
            color: #b80a0a;
            
        }        

        #calculateTheTime {
            padding: 10px 10px;
        }

        #results {
            border: 1px solid #a0a77a;
            font-size: 1.5rem;
            max-width: 700px;
            margin: 20px auto;
            padding: 15px;
        }

        #alert {
            color: #3d3d3d;
            font-size: 1rem;
            margin-top: 10px;
        }

        button {
            letter-spacing: 5px;
            background: #ee0606;
            color: #0a0a0a;
            border: none;
            font-size: 1.5rem;
            padding: 10px, 30px;
            margin-top: 20px;
            cursor: pointer;
            
        }

        #wastedTimeArea{
            text-align: left;
            position: fixed;
            top: 20px;
            left: 20px;
        }
    </style>


    </head>

    <body>
        
        <header>
            <h1 class="font-effect-3d-float" style="color: red;"> Wasted Time </h1> <!-- Using the 3d-float effect from google-->
            <p> Find out how much time you have wasted... </p>
        </header>

        <div id="userData">
        <label> State Your age </label>
        <br>
        <input type="number" id="userAge" placeholder="example: 16">
        <br>
        <br>
        <br>
        <label> How much hours do you spend on useless tasks everyday? </label>
        <label style="color: #35b831;">(for example tiktok)</label>
        <br>
        <input type="number" id="userHours" placeholder="example: 4">
        <p id="alert">Please remember nothing will be saved, its all local.</p>
        </div>

        <div id="calculation">
            <button id="calculateTheTime">Show me the damage</button>
        </div>

        <div id="results" style="display: none;">
            <h2 id="resultText"> placeholder </h2>
            <h3 id="factText"> placeholder </h3>
        </div>

        <div id="wastedTimeArea" style="display: none;">
        <p id="wastedHours">placeholder</p>
        <p id="wastedDays">placeholder</p>
        <p id="wastedYears">placeholder</p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
